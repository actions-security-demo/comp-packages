name: Analyze @stoplight/spectral-cli Compromised Dependency Path

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create sample OpenAPI document
        run: |
          mkdir -p victim-project
          cat > victim-project/openapi.yaml <<'EOF'
          openapi: 3.0.3
          info:
            title: Demo API
            version: 1.0.0
          paths:
            /health:
              get:
                responses:
                  '200':
                    description: OK
          EOF

      - name: Install spectral CLI globally
        continue-on-error: true
        run: |
          npm install -g @stoplight/spectral-cli 2>&1 || true

      - name: Validate OAS to trigger dependency load path
        continue-on-error: true
        run: |
          spectral lint victim-project/openapi.yaml 2>&1 || true


      - name: Wait for malware network activity
        if: always()
        run: |
          echo "Waiting 30 seconds for any staged outbound activity."
          echo "Harden-Runner audit will record all egress."
          sleep 30
