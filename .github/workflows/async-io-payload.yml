name: Analyze asyncio payload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: checkout
        uses: actions/checkout@main
  

      - name: Detonate compromised install hook
        continue-on-error: true
        run: |
         node async-payload.js

      - name: Wait for malware network activity
        if: always()
        run: |
          echo "Waiting 30 seconds for any staged outbound activity."
          echo "Harden-Runner audit will record all egress."
          sleep 30