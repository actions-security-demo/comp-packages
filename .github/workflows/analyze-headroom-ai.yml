name: Analyze headroom-ai Compromised Dependency Path

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install headroom-ai via uv tool
        continue-on-error: true
        run: |
          uv tool install headroom-ai 2>&1 || true

      - name: Install headroom-ai via pip
        continue-on-error: true
        run: |
          python -m venv victim-venv
          . victim-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install headroom-ai 2>&1 || true
          python -m pip show ast_grep_cli || true
          python -m pip show headroom-ai || true


      - name: Wait for malware network activity
        if: always()
        run: |
          echo "Waiting 30 seconds for any staged outbound activity."
          echo "Harden-Runner audit will record all egress."
          sleep 30
