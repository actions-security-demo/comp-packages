name: Analyze simonecorsi/mawesome

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: h0x0er/harden-runner@int-pr3
        with:
          egress-policy: audit
      - uses: "oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6"
      - name: Run semantic-release-action
        uses: simonecorsi/mawesome@v2.2.0

      - name: wait
        if: always()
        run: sleep 30s
