name: Analyze mrmustard Malicious PyPI Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv, install package, and import to trigger payload
        continue-on-error: true
        run: |
          python -m venv victim-venv
          victim-venv/bin/python -m pip install --upgrade pip
          victim-venv/bin/python -m pip install ./mrmustard-0.7.4.tar.gz 2>&1 || true
          victim-venv/bin/python -m pip show mrmustard || true
          victim-venv/bin/python -c "import mrmustard" 2>&1 || true

      - name: Inspect installed files
        if: always()
        continue-on-error: true
        run: |
          victim-venv/bin/python -m pip show -f mrmustard || true
          find victim-venv -iname '*mrmustard*' -o -iname '*.so' -o -iname '*.dll' -o -iname '*.dylib' -o -iname '*.exe' || true

      - name: Wait for malware network activity
        if: always()
        run: |
          echo "Waiting 30 seconds for any staged outbound activity."
          echo "Harden-Runner audit will record all egress."
          sleep 30
